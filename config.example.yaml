# คัดลอกไฟล์นี้เป็น config.yaml แล้วใส่ค่าของคุณ
# cp config.example.yaml config.yaml

exchange:
  name: binance          # ชื่อ exchange ตาม ccxt (binance, okx, bybit, ...)
  api_key: ""            # ใส่ API key (ต้องใช้เฉพาะตอนรันบอทเทรดจริง/sandbox)
  api_secret: ""
  sandbox: true          # true = paper trading (เงินปลอม), false = เงินจริง! ระวัง

defaults:
  symbol: BTC/USDT
  timeframe: 1h          # 1m, 5m, 15m, 1h, 4h, 1d
  limit: 500             # จำนวนแท่งเทียนที่ดึง

# กลยุทธ์เริ่มต้น (ดู crypto_trader/strategy.py)
strategy:
  name: ema_cross        # ema_cross | rsi | macd
  fast: 19               # จาก optimize BTC/USDT 1h (ดีกว่า 12/26)
  slow: 55
  rsi_period: 14
  rsi_oversold: 30
  rsi_overbought: 70
  trend_filter_enabled: false # true = เทรด long เฉพาะตอนราคาอยู่เหนือ EMA ระยะยาว
  trend_ema_period: 200

backtest:
  initial_cash: 10000    # USDT
  fee: 0.001             # 0.1% ต่อการเทรด
  position_size: 1.0     # สัดส่วนเงินที่ลงต่อไม้ (1.0 = all-in)

bot:
  poll_seconds: 60       # เช็คสัญญาณทุกกี่วินาที
  trade_amount: 0.001    # ปริมาณเหรียญต่อไม้ (เช่น 0.001 BTC)
  summary_enabled: true   # ส่งสรุป performance เข้า Discord/console หลังรันแต่ละรอบ
  enter_on_current_signal: true # DRY-RUN: ถ้ากลยุทธ์บอกว่าควรถืออยู่แล้ว ให้จำลอง BUY ได้

paper:
  enabled: true           # จำลองพอร์ตใน DRY-RUN โดยไม่ส่ง order จริง
  initial_cash: 300       # ทุนจำลองเริ่มต้น (USDT)
  allocation_pct: 0.2     # โหมด allocation: ใช้เงินสดสูงสุด 20% ต่อไม้
  fee: 0.001              # fee จำลอง 0.1%
  sizing_mode: risk       # allocation = ใช้ % เงินสด | risk = เสี่ยงคงที่ต่อไม้ (แนะนำ)
  risk_per_trade_pct: 0.01 # โหมด risk: ถ้าโดน SL จะเสีย ~1% ของพอร์ต (ขนาดไม้ปรับตามระยะ stop)

market_filter:
  enabled: true           # เปิด BUY เฉพาะตอน BTC 4h อยู่เหนือ EMA200
  symbol: BTC/USDT
  timeframe: 4h
  ema_period: 200

smart_filter:
  enabled: true           # กรอง BUY เพิ่มจากข้อมูล 4h ของเหรียญนั้นเอง
  timeframe: 4h
  ema_period: 200         # ราคาเหรียญต้องอยู่เหนือ EMA200
  rsi_period: 14
  rsi_min: 45             # RSI ต่ำกว่านี้ถือว่า momentum อ่อน
  rsi_max: 70             # RSI สูงกว่านี้เสี่ยงไล่ซื้อปลายรอบ
  atr_period: 14
  max_atr_pct: 0.06       # ATR/ราคา เกิน 6% ถือว่าแกว่งแรงเกินไป
  loss_cooldown_hours: 24 # หลัง SELL ขาดทุน พัก symbol นั้น 24 ชั่วโมง

risk:
  stop_loss_pct: 0.02    # ขาดทุน 2% จากราคาเข้าแล้วขายออก (ใช้เมื่อ atr_stops_enabled=false)
  take_profit_pct: 0.04  # กำไร 4% จากราคาเข้าแล้วขายออก (ใช้เมื่อ atr_stops_enabled=false)
  max_position_pct: 1.0  # เพดานขนาด position เทียบกับเงินพอร์ตสำหรับ backtest
  # exit ขั้นสูง — ปิดไว้ก่อน เปิดเพื่อทดลองในขาขึ้นแล้ว backtest เทียบก่อนใช้จริง
  trailing_stop_pct: 0.0    # 0 = ปิด; เช่น 0.08 = ขายเมื่อราคาย่อ 8% จากจุดสูงสุด (ปล่อยกำไรวิ่ง)
  atr_stops_enabled: false  # true = ใช้ ATR กำหนด SL/TP ตามความผันผวนจริง (แทน % ตายตัว)
  atr_period: 14
  atr_sl_mult: 3.0          # SL = ราคาเข้า − 3×ATR
  atr_tp_mult: 5.0          # TP = ราคาเข้า + 5×ATR
  max_concurrent_positions: 3 # 0 = ไม่จำกัด; 3 = ถือพร้อมกันสูงสุด 3 เหรียญ (คุมเสี่ยงพอร์ตรวม)
  journal_path: trade_journal.csv

alerts:
  discord:
    enabled: false
    webhook_url: ""      # จาก Discord: Server Settings > Integrations > Webhooks
  telegram:
    enabled: false
    bot_token: ""        # จาก @BotFather
    chat_id: ""
