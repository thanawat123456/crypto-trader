# คัดลอกไฟล์นี้เป็น config.yaml แล้วใส่ค่าของคุณ
# cp config.example.yaml config.yaml

exchange:
  name: binance          # ชื่อ exchange ตาม ccxt (binance, okx, bybit, ...)
  api_key: ""            # ใส่ API key (ต้องใช้เฉพาะตอนรันบอทเทรดจริง/sandbox)
  api_secret: ""
  sandbox: true          # true = paper trading (เงินปลอม), false = เงินจริง! ระวัง

defaults:
  symbol: BTC/USDT
  timeframe: 1h          # 1m, 5m, 15m, 1h, 4h, 1d
  limit: 500             # จำนวนแท่งเทียนที่ดึง

# กลยุทธ์เริ่มต้น (ดู crypto_trader/strategy.py)
strategy:
  name: ema_cross        # ema_cross | rsi | macd
  fast: 19               # จาก optimize BTC/USDT 1h (ดีกว่า 12/26)
  slow: 55
  rsi_period: 14
  rsi_oversold: 30
  rsi_overbought: 70
  trend_filter_enabled: false # true = เทรด long เฉพาะตอนราคาอยู่เหนือ EMA ระยะยาว
  trend_ema_period: 200

backtest:
  initial_cash: 10000    # USDT
  fee: 0.001             # 0.1% ต่อการเทรด
  position_size: 1.0     # สัดส่วนเงินที่ลงต่อไม้ (1.0 = all-in)

bot:
  poll_seconds: 60       # เช็คสัญญาณทุกกี่วินาที
  trade_amount: 0.001    # ปริมาณเหรียญต่อไม้ (เช่น 0.001 BTC)
  summary_enabled: true   # ส่งสรุป performance เข้า Discord/console หลังรันแต่ละรอบ

paper:
  enabled: true           # จำลองพอร์ตใน DRY-RUN โดยไม่ส่ง order จริง
  initial_cash: 300       # ทุนจำลองเริ่มต้น (USDT)
  allocation_pct: 0.2     # ใช้เงินสดสูงสุด 20% ต่อไม้
  fee: 0.001              # fee จำลอง 0.1%

risk:
  stop_loss_pct: 0.02    # ขาดทุน 2% จากราคาเข้าแล้วขายออก
  take_profit_pct: 0.04  # กำไร 4% จากราคาเข้าแล้วขายออก
  max_position_pct: 1.0  # เพดานขนาด position เทียบกับเงินพอร์ตสำหรับ backtest
  journal_path: trade_journal.csv

alerts:
  discord:
    enabled: false
    webhook_url: ""      # จาก Discord: Server Settings > Integrations > Webhooks
  telegram:
    enabled: false
    bot_token: ""        # จาก @BotFather
    chat_id: ""
