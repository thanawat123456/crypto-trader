name: crypto-trader-bot

# ใช้สำหรับกด Run workflow เพื่อทดสอบเท่านั้น
# รอบอัตโนมัติย้ายไปรันบน Google Cloud ผ่าน systemd แล้ว เพื่อไม่ให้บอทรันซ้ำ 2 ที่
on:
  workflow_dispatch:        # ปุ่มกดรันเองจากหน้าเว็บ GitHub

concurrency:
  group: trading-bot
  cancel-in-progress: false

jobs:
  trade:
    runs-on: ubuntu-latest
    env:
      EXCHANGE_NAME: kraken
      DISCORD_WEBHOOK_URL: ${{ secrets.DISCORD_WEBHOOK_URL }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      # เก็บ/กู้สถานะบอทและ journal ข้ามรอบ — กันแจ้งเตือนซ้ำและเก็บประวัติเทรด
      - name: กู้สถานะบอท
        uses: actions/cache@v4
        with:
          path: |
            bot_state.json
            trade_journal.csv
          key: bot-state-${{ github.run_id }}
          restore-keys: bot-state-

      - name: ติดตั้ง dependencies
        run: pip install -r requirements.txt

      - name: แสดง trigger ของ workflow
        run: |
          echo "event_name=${GITHUB_EVENT_NAME}"
          echo "ref=${GITHUB_REF}"
          echo "sha=${GITHUB_SHA}"

      - name: รันบอท 1 รอบต่อ symbol
        run: |
          symbols=("BTC/USDT" "ETH/USDT" "SOL/USDT" "XRP/USDT" "ADA/USDT")
          for symbol in "${symbols[@]}"; do
            echo "=== Running $symbol ==="
            python -m crypto_trader bot "$symbol" -t 1h --once
          done

      - name: อัปโหลดสถานะและ journal
        uses: actions/upload-artifact@v4
        with:
          name: trading-bot-state
          path: |
            bot_state.json
            trade_journal.csv
          if-no-files-found: warn
